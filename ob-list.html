<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OB一覧 — 杏葉硬式庭球会</title>
<meta name="robots" content="noindex" />
<style>
  :root { --bg:#05060c; --fg:#eef1ff; --gold:#d4af37; --magenta:#ff3d7f; --dim:#8a93b8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:
      radial-gradient(ellipse at 70% 0%, rgba(212,175,55,0.10), transparent 50%),
      linear-gradient(135deg, #05060c, #03040a);
    min-height:100vh; color:var(--fg);
    font-family:"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing:antialiased; padding:6vh 5vw 12vh;
  }
  .wrap { width:min(1040px, 100%); margin:0 auto; }
  .label { font-size:0.72rem; letter-spacing:0.45em; color:var(--gold); text-transform:uppercase; }
  h1 { margin-top:1rem; font-size:clamp(1.8rem,5vw,2.8rem); font-weight:800; line-height:1.3; }
  .lead { margin-top:1rem; font-size:0.9rem; color:var(--dim); line-height:1.9; max-width:60ch; }
  .home { display:inline-block; margin-top:1.4rem; font-size:0.8rem; color:var(--dim); text-decoration:none; letter-spacing:0.1em; }
  .home:hover { color:var(--gold); }
  .state { color:var(--dim); font-size:0.95rem; margin-top:3rem; }
  .grid { margin-top:2.6rem; display:grid; gap:1.3rem; grid-template-columns:repeat(auto-fill, minmax(min(300px,100%),1fr)); }
  .card {
    padding:1.6rem 1.5rem; border:1px solid rgba(212,175,55,0.25); border-radius:14px;
    background:linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    display:flex; flex-direction:column; gap:0.5rem;
  }
  .card .top { display:flex; align-items:center; justify-content:space-between; gap:0.6rem; }
  .card .term { font-size:1.15rem; font-weight:800; color:var(--gold); letter-spacing:0.05em; }
  .badge { font-size:0.62rem; letter-spacing:0.15em; padding:0.25em 0.7em; border-radius:999px; border:1px solid; white-space:nowrap; }
  .badge.ok { color:#7CFFB2; border-color:rgba(124,255,178,0.4); }
  .badge.maybe { color:var(--gold); border-color:rgba(212,175,55,0.4); }
  .rows { display:flex; flex-direction:column; gap:0.35rem; margin-top:0.4rem; }
  .row { display:flex; gap:0.7rem; font-size:0.9rem; }
  .row .k { color:var(--dim); flex:none; width:4.2em; }
  .row .v { color:var(--fg); }
  .intro { margin-top:0.6rem; font-size:0.85rem; color:#cdd3ee; line-height:1.8; border-top:1px solid rgba(255,255,255,0.08); padding-top:0.8rem; }
  .req-btn {
    margin-top:1rem; padding:0.85rem 1rem; font-size:0.9rem; font-weight:800; letter-spacing:0.1em;
    color:#7a83a8; background:rgba(255,255,255,0.04); border:1px dashed rgba(212,175,55,0.35);
    border-radius:9px; cursor:not-allowed;
  }
  [hidden]{ display:none !important; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">OB List</div>
    <h1>OB一覧</h1>
    <p class="lead">OB訪問・キャリア相談を受け付けている先輩の一覧です（氏名は非公開）。気になる先輩へ、依頼ボタンから相談を申し込めます。連絡先は、先輩が承認した場合のみ交換されます。</p>
    <a class="home" href="./">← トップページへ戻る</a>

    <p class="state" id="loading">読み込み中...</p>
    <p class="state" id="empty" hidden>現在、公開中のOBはいません。</p>
    <p class="state" id="error" hidden>一覧を読み込めませんでした。時間をおいて再度お試しください。</p>
    <div class="grid" id="grid" hidden></div>
  </div>

  <script>
  (function () {
    var GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx_0-wzZN16mH8fg7TjybGfajmq_rCJTezzhChoW8PJo6VcnymkYo10LPvnbE9n-XJi/exec';
    var $ = function (id) { return document.getElementById(id); };
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);}); }
    function rowHtml(k,v){ return v ? '<div class="row"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>' : ''; }

    fetch(GAS_ENDPOINT + '?action=oblist')
      .then(function(r){ return r.json(); })
      .then(function(res){
        $('loading').hidden = true;
        if (!res || !res.ok) { $('error').hidden = false; return; }
        var list = res.list || [];
        if (!list.length) { $('empty').hidden = false; return; }
        var grid = $('grid');
        grid.innerHTML = list.map(function(o){
          var badge = o.consult === '応相談'
            ? '<span class="badge maybe">応相談</span>'
            : '<span class="badge ok">訪問OK</span>';
          return '<div class="card">'
            + '<div class="top"><span class="term">'+esc(o.term||'')+(o.term?'期':'')+'</span>'+badge+'</div>'
            + '<div class="rows">'
            +   rowHtml('業界', o.industry)
            +   rowHtml('職種', o.jobtype)
            +   rowHtml('会社', o.company)
            +   rowHtml('性別', o.gender)
            + '</div>'
            + (o.intro ? '<div class="intro">'+esc(o.intro)+'</div>' : '')
            + '<button class="req-btn" type="button" disabled data-pubid="'+esc(o.pubid)+'">OB訪問を依頼する（準備中）</button>'
            + '</div>';
        }).join('');
        grid.hidden = false;
      })
      .catch(function(){ $('loading').hidden = true; $('error').hidden = false; });
  })();
  </script>
</body>
</html>
