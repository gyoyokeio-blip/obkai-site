<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OB一覧 — 杏葉硬式庭球会</title>
<meta name="robots" content="noindex" />
<style>
  :root { --bg:#05060c; --fg:#eef1ff; --gold:#d4af37; --magenta:#ff3d7f; --dim:#8a93b8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:
      radial-gradient(ellipse at 70% 0%, rgba(212,175,55,0.10), transparent 50%),
      linear-gradient(135deg, #05060c, #03040a);
    min-height:100vh; color:var(--fg);
    font-family:"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing:antialiased; padding:6vh 5vw 12vh;
  }
  .wrap { width:min(1040px, 100%); margin:0 auto; }
  .label { font-size:0.72rem; letter-spacing:0.45em; color:var(--gold); text-transform:uppercase; }
  h1 { margin-top:1rem; font-size:clamp(1.8rem,5vw,2.8rem); font-weight:800; line-height:1.3; }
  .lead { margin-top:1rem; font-size:0.9rem; color:var(--dim); line-height:1.9; max-width:60ch; }
  .home { display:inline-block; margin-top:1.4rem; font-size:0.8rem; color:var(--dim); text-decoration:none; letter-spacing:0.1em; }
  .home:hover { color:var(--gold); }
  .state { color:var(--dim); font-size:0.95rem; margin-top:3rem; }
  .grid { margin-top:2.6rem; display:grid; gap:1.3rem; grid-template-columns:repeat(auto-fill, minmax(min(300px,100%),1fr)); }
  .card {
    padding:1.6rem 1.5rem; border:1px solid rgba(212,175,55,0.25); border-radius:14px;
    background:linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    display:flex; flex-direction:column; gap:0.5rem;
  }
  .card .top { display:flex; align-items:center; justify-content:space-between; gap:0.6rem; }
  .card .term { font-size:1.15rem; font-weight:800; color:var(--gold); letter-spacing:0.05em; }
  .badge { font-size:0.62rem; letter-spacing:0.15em; padding:0.25em 0.7em; border-radius:999px; border:1px solid; white-space:nowrap; }
  .badge.ok { color:#7CFFB2; border-color:rgba(124,255,178,0.4); }
  .badge.maybe { color:var(--gold); border-color:rgba(212,175,55,0.4); }
  .rows { display:flex; flex-direction:column; gap:0.35rem; margin-top:0.4rem; }
  .row { display:flex; gap:0.7rem; font-size:0.9rem; }
  .row .k { color:var(--dim); flex:none; width:4.2em; }
  .row .v { color:var(--fg); }
  .intro { margin-top:0.6rem; font-size:0.85rem; color:#cdd3ee; line-height:1.8; border-top:1px solid rgba(255,255,255,0.08); padding-top:0.8rem; }
  .req-btn {
    margin-top:1rem; padding:0.85rem 1rem; font-size:0.9rem; font-weight:800; letter-spacing:0.1em;
    color:#7a83a8; background:rgba(255,255,255,0.04); border:1px dashed rgba(212,175,55,0.35);
    border-radius:9px; cursor:not-allowed;
  }
  .req-btn.active { color:var(--bg); background:linear-gradient(90deg,var(--gold),#f5d76e); border:0; cursor:pointer; transition:transform .15s, box-shadow .15s; }
  .req-btn.active:hover { transform:translateY(-2px); box-shadow:0 0 28px rgba(212,175,55,0.4); }

  /* request modal */
  .overlay { position:fixed; inset:0; z-index:60; background:rgba(3,4,9,0.85); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center; padding:5vh 5vw; opacity:0; pointer-events:none; transition:opacity .3s; }
  .overlay.open { opacity:1; pointer-events:auto; }
  .modal { position:relative; width:min(560px,96vw); max-height:90vh; overflow-y:auto;
    background:linear-gradient(160deg,#0d0f18,#07080e); border:1px solid rgba(212,175,55,0.35);
    border-radius:16px; padding:2.4rem 2rem; text-align:left; }
  .modal h2 { font-size:1.3rem; font-weight:800; }
  .modal .sub { margin-top:0.5rem; font-size:0.82rem; color:var(--dim); line-height:1.8; }
  .modal-close { position:absolute; top:0.9rem; right:0.9rem; width:36px; height:36px; border-radius:50%;
    border:1px solid rgba(212,175,55,0.4); background:transparent; color:var(--gold); font-size:1.2rem; cursor:pointer; }
  .mform { margin-top:1.8rem; display:flex; flex-direction:column; gap:1.1rem; }
  .mform .field-label { display:block; font-size:0.72rem; letter-spacing:0.25em; color:var(--gold); margin-bottom:0.5rem; }
  .mform .field-label .req { font-style:normal; font-size:0.6rem; color:var(--magenta); border:1px solid rgba(255,61,127,0.5); border-radius:4px; padding:0.1em 0.45em; margin-left:0.5em; }
  .mform input, .mform select, .mform textarea { width:100%; padding:0.85rem 1rem; background:rgba(255,255,255,0.04); color:var(--fg);
    border:1px solid rgba(212,175,55,0.25); border-radius:9px; font-size:0.95rem; font-family:inherit; }
  .mform textarea { min-height:90px; resize:vertical; line-height:1.6; }
  .mform input:focus, .mform select:focus, .mform textarea:focus { outline:none; border-color:var(--gold); }
  .mform select { appearance:none; cursor:pointer; }
  .mform .radio-row { display:flex; flex-wrap:wrap; gap:1rem; }
  .mform .radio { display:flex; align-items:center; gap:0.45rem; font-size:0.9rem; cursor:pointer; }
  .mform .radio input { width:18px; height:18px; accent-color:var(--gold); }
  .mbtn { margin-top:0.4rem; padding:1.1rem; font-size:0.95rem; font-weight:800; letter-spacing:0.12em; color:var(--bg);
    background:linear-gradient(90deg,var(--gold),#f5d76e); border:0; border-radius:10px; cursor:pointer; }
  .mbtn:disabled { opacity:0.5; cursor:default; }
  .mmsg { font-size:0.85rem; line-height:1.7; }
  .mmsg.err { color:var(--magenta); }
  .mmsg.ok { color:var(--gold); margin-top:1rem; }
  .filters { margin-top:2rem; display:flex; flex-wrap:wrap; gap:0.7rem; align-items:center; }
  .filters select, .filters input {
    padding:0.7rem 1rem; background:rgba(255,255,255,0.04); color:var(--fg);
    border:1px solid rgba(212,175,55,0.25); border-radius:9px; font-size:0.9rem; font-family:inherit;
  }
  .filters input { min-width:200px; flex:1; }
  .filters input::placeholder { color:#555; }
  .filters select { appearance:none; cursor:pointer; padding-right:2rem;
    background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
    background-position:calc(100% - 16px) 50%,calc(100% - 11px) 50%; background-size:6px 6px,6px 6px; background-repeat:no-repeat;
  }
  .filters select:focus, .filters input:focus { outline:none; border-color:var(--gold); }
  .filters option { background:#11131c; }
  .count { font-size:0.8rem; color:var(--dim); margin-left:auto; white-space:nowrap; }
  [hidden]{ display:none !important; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">OB List</div>
    <h1>OB一覧</h1>
    <p class="lead">OB訪問・キャリア相談を受け付けている先輩の一覧です（氏名は非公開）。気になる先輩へ、依頼ボタンから相談を申し込めます。連絡先は、先輩が承認した場合のみ交換されます。</p>
    <a class="home" href="./">← トップページへ戻る</a>

    <div class="filters" id="filters" hidden>
      <select id="f-industry"><option value="">業界：すべて</option></select>
      <select id="f-jobtype"><option value="">職種：すべて</option></select>
      <select id="f-consult">
        <option value="">受入：すべて</option>
        <option value="可">訪問OK</option>
        <option value="応相談">応相談</option>
      </select>
      <input type="text" id="f-keyword" placeholder="キーワード（会社名・一言・期など）" />
      <span class="count" id="count"></span>
    </div>

    <p class="state" id="loading">読み込み中...</p>
    <p class="state" id="empty" hidden>現在、公開中のOBはいません。</p>
    <p class="state" id="noresult" hidden>条件に合うOBが見つかりません。絞り込みを変更してください。</p>
    <p class="state" id="error" hidden>一覧を読み込めませんでした。時間をおいて再度お試しください。</p>
    <div class="grid" id="grid" hidden></div>
  </div>

  <!-- request modal -->
  <div class="overlay" id="ov">
    <div class="modal">
      <button class="modal-close" id="mclose" aria-label="閉じる">×</button>
      <h2>OB訪問を依頼する</h2>
      <p class="sub" id="mtarget"></p>
      <form class="mform" id="rform" novalidate>
        <div><span class="field-label">期</span><input type="text" name="term" placeholder="例）48期" /></div>
        <div><span class="field-label">学年</span>
          <select name="grade">
            <option value="">選択してください</option>
            <option>学部1年</option><option>学部2年</option><option>学部3年</option><option>学部4年</option>
            <option>修士1年</option><option>修士2年</option><option>その他</option>
          </select>
        </div>
        <div><span class="field-label">学部</span><input type="text" name="faculty" placeholder="例）経済学部" /></div>
        <div><span class="field-label">メールアドレス <em class="req">必須</em></span><input type="email" name="studentEmail" placeholder="例）you@keio.jp" /></div>
        <div><span class="field-label">相談内容 <em class="req">必須</em></span><textarea name="topic" placeholder="例）金融業界の働き方について伺いたいです。"></textarea></div>
        <div><span class="field-label">希望方法</span>
          <div class="radio-row">
            <label class="radio"><input type="radio" name="method" value="オンライン" /> オンライン（Web会議）</label>
            <label class="radio"><input type="radio" name="method" value="対面" /> 対面</label>
            <label class="radio"><input type="radio" name="method" value="メール・チャット" /> メール・チャット</label>
          </div>
        </div>
        <div><span class="field-label">希望日時</span><input type="text" name="datetime" placeholder="例）平日夜、または ○月○日 19時〜" /></div>
        <p class="mmsg err" id="merror" hidden></p>
        <button type="submit" class="mbtn" id="msubmit">この内容で依頼する</button>
      </form>
      <p class="mmsg ok" id="mdone" hidden>依頼を送信しました。先輩が承認すると、メールで連絡先が届きます。</p>
    </div>
  </div>

  <script>
  (function () {
    var GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx_0-wzZN16mH8fg7TjybGfajmq_rCJTezzhChoW8PJo6VcnymkYo10LPvnbE9n-XJi/exec';
    var $ = function (id) { return document.getElementById(id); };
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);}); }
    function rowHtml(k,v){ return v ? '<div class="row"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>' : ''; }
    function uniq(arr){ return Array.from(new Set(arr.filter(Boolean))).sort(function(a,b){return String(a).localeCompare(String(b),'ja',{numeric:true});}); }
    function fillSelect(sel, values){ values.forEach(function(v){ var o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); }); }

    var ALL = [];

    function cardHtml(o){
      var badge = o.consult === '応相談'
        ? '<span class="badge maybe">応相談</span>'
        : '<span class="badge ok">訪問OK</span>';
      return '<div class="card">'
        + '<div class="top"><span class="term">'+esc(o.term||'')+(o.term?'期':'')+'</span>'+badge+'</div>'
        + '<div class="rows">'
        +   rowHtml('業界', o.industry)
        +   rowHtml('職種', o.jobtype)
        +   rowHtml('会社', o.company)
        +   rowHtml('性別', o.gender)
        + '</div>'
        + (o.intro ? '<div class="intro">'+esc(o.intro)+'</div>' : '')
        + '<button class="req-btn active" type="button" data-pubid="'+esc(o.pubid)+'" data-term="'+esc(o.term||'')+'" data-industry="'+esc(o.industry||'')+'">OB訪問を依頼する</button>'
        + '</div>';
    }

    function applyFilters(){
      var fi = $('f-industry').value, fj = $('f-jobtype').value, fc = $('f-consult').value;
      var kw = $('f-keyword').value.trim().toLowerCase();
      var filtered = ALL.filter(function(o){
        if (fi && o.industry !== fi) return false;
        if (fj && o.jobtype !== fj) return false;
        if (fc && o.consult !== fc) return false;
        if (kw) {
          var hay = ((o.company||'')+' '+(o.intro||'')+' '+(o.industry||'')+' '+(o.jobtype||'')+' '+(o.term||'')).toLowerCase();
          if (hay.indexOf(kw) < 0) return false;
        }
        return true;
      });
      var grid = $('grid');
      $('count').textContent = filtered.length + ' / ' + ALL.length + ' 件';
      if (!filtered.length) { grid.hidden = true; $('noresult').hidden = false; return; }
      $('noresult').hidden = true;
      grid.innerHTML = filtered.map(cardHtml).join('');
      grid.hidden = false;
    }

    /* ---- request modal ---- */
    var ov = $('ov'), rform = $('rform'), currentPubid = '';
    function openModal(btn){
      currentPubid = btn.getAttribute('data-pubid');
      $('mtarget').textContent = '相手：' + (btn.getAttribute('data-term')||'') + '期 ／ ' + (btn.getAttribute('data-industry')||'');
      rform.hidden = false; $('mdone').hidden = true; $('merror').hidden = true; rform.reset();
      ov.classList.add('open');
    }
    function closeModal(){ ov.classList.remove('open'); }
    $('mclose').addEventListener('click', closeModal);
    ov.addEventListener('click', function(e){ if (e.target === ov) closeModal(); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });
    $('grid').addEventListener('click', function(e){
      var btn = e.target.closest('.req-btn.active');
      if (btn) openModal(btn);
    });
    rform.addEventListener('submit', function(e){
      e.preventDefault();
      var err = $('merror'); err.hidden = true;
      var email = rform.studentEmail.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent='有効なメールアドレスを入力してください。'; err.hidden=false; return; }
      if (!rform.topic.value.trim()) { err.textContent='相談内容をご記入ください。'; err.hidden=false; return; }
      var data = {
        action:'request', ob:currentPubid,
        term:rform.term.value.trim(), grade:rform.grade.value, faculty:rform.faculty.value.trim(),
        studentEmail:email, topic:rform.topic.value.trim(),
        method:(rform.querySelector('input[name="method"]:checked')||{}).value||'',
        datetime:rform.datetime.value.trim()
      };
      var btn = $('msubmit'); btn.disabled = true; btn.textContent = '送信中...';
      fetch(GAS_ENDPOINT, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(data) })
        .then(function(r){ return r.json(); })
        .then(function(res){
          if (res && res.ok) { rform.hidden = true; $('mdone').hidden = false; }
          else { throw new Error((res&&res.error)||'unknown'); }
        })
        .catch(function(){ err.textContent='送信に失敗しました。時間をおいて再度お試しください。'; err.hidden=false; })
        .finally(function(){ btn.disabled=false; btn.textContent='この内容で依頼する'; });
    });

    fetch(GAS_ENDPOINT + '?action=oblist')
      .then(function(r){ return r.json(); })
      .then(function(res){
        $('loading').hidden = true;
        if (!res || !res.ok) { $('error').hidden = false; return; }
        ALL = res.list || [];
        if (!ALL.length) { $('empty').hidden = false; return; }
        fillSelect($('f-industry'), uniq(ALL.map(function(o){return o.industry;})));
        fillSelect($('f-jobtype'),  uniq(ALL.map(function(o){return o.jobtype;})));
        $('filters').hidden = false;
        ['f-industry','f-jobtype','f-consult'].forEach(function(id){ $(id).addEventListener('change', applyFilters); });
        $('f-keyword').addEventListener('input', applyFilters);
        applyFilters();
      })
      .catch(function(){ $('loading').hidden = true; $('error').hidden = false; });
  })();
  </script>
</body>
</html>
