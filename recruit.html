<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>現役生への依頼（アルバイト・求人） — 杏葉硬式庭球会</title>
<meta name="robots" content="noindex" />
<style>
  :root { --bg:#05060c; --fg:#eef1ff; --gold:#d4af37; --magenta:#ff3d7f; --dim:#8a93b8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at 70% 20%, rgba(212,175,55,0.10), transparent 50%), linear-gradient(135deg,#05060c,#03040a);
    min-height:100vh; color:var(--fg); font-family:"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center; padding:6vh 5vw 12vh;
  }
  .wrap { width:min(560px,100%); }
  .label { font-size:0.72rem; letter-spacing:0.45em; color:var(--gold); text-transform:uppercase; }
  h1 { margin-top:1rem; font-size:clamp(1.6rem,5vw,2.4rem); font-weight:800; line-height:1.3; }
  .lead { margin-top:0.9rem; font-size:0.85rem; color:var(--dim); line-height:1.9; }
  .home { display:inline-block; margin-top:1.4rem; font-size:0.8rem; color:var(--dim); text-decoration:none; letter-spacing:0.1em; }
  .home:hover { color:var(--gold); }
  form { margin-top:2.2rem; display:flex; flex-direction:column; gap:1.3rem; }
  .field-label { display:block; font-size:0.72rem; letter-spacing:0.25em; color:var(--gold); margin-bottom:0.55rem; }
  .field-label .req { font-style:normal; font-size:0.6rem; color:var(--magenta); border:1px solid rgba(255,61,127,0.5); border-radius:4px; padding:0.1em 0.45em; margin-left:0.5em; }
  input, select, textarea { width:100%; padding:0.95rem 1.1rem; background:rgba(255,255,255,0.04); color:var(--fg);
    border:1px solid rgba(212,175,55,0.25); border-radius:10px; font-size:1rem; font-family:inherit; }
  textarea { min-height:120px; resize:vertical; line-height:1.7; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--gold); box-shadow:0 0 18px rgba(212,175,55,0.2); }
  input::placeholder, textarea::placeholder { color:#555; }
  select { appearance:none; cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
    background-position:calc(100% - 20px) 50%,calc(100% - 14px) 50%; background-size:6px 6px,6px 6px; background-repeat:no-repeat; }
  select option { background:#11131c; }
  .btn { margin-top:0.4rem; padding:1.15rem; font-size:1rem; font-weight:800; letter-spacing:0.15em; color:var(--bg);
    background:linear-gradient(90deg,var(--gold),#f5d76e); border:0; border-radius:10px; cursor:pointer; transition:transform .2s, box-shadow .2s; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(212,175,55,0.5); }
  .btn:disabled { opacity:0.5; cursor:default; transform:none; box-shadow:none; }
  .msg { margin-top:1rem; font-size:0.9rem; line-height:1.8; }
  .msg.err { color:var(--magenta); }
  .msg.ok { color:var(--gold); }
  [hidden]{ display:none !important; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">Recruit</div>
    <h1>現役生への依頼</h1>
    <p class="lead">OB・OGから現役部員へ、アルバイトの依頼や求人のご案内ができます。内容をお送りいただくと、幹事が確認し、現役へご連絡いたします。</p>
    <a class="home" href="./">← トップページへ戻る</a>

    <form id="rform" novalidate>
      <div>
        <span class="field-label">種類</span>
        <select name="kind">
          <option>アルバイト</option>
          <option>インターン</option>
          <option>新卒・中途求人</option>
          <option>単発・お手伝い</option>
          <option>その他</option>
        </select>
      </div>
      <div><span class="field-label">お名前</span><input type="text" name="name" autocomplete="name" placeholder="例）杏葉 太郎" /></div>
      <div><span class="field-label">期</span><input type="text" name="term" inputmode="numeric" placeholder="例）40（数字のみ）" oninput="this.value=this.value.replace(/[^0-9]/g,'')" /></div>
      <div><span class="field-label">連絡先メールアドレス <em class="req">必須</em></span><input type="email" name="email" autocomplete="email" placeholder="例）you@example.com" /><span style="display:block;margin-top:0.4rem;font-size:0.78rem;color:var(--dim);">※会員登録時のメールアドレスをご入力ください（未登録の方は先にご登録を）。</span></div>
      <div><span class="field-label">依頼内容 <em class="req">必須</em></span><textarea name="body" placeholder="例）週2〜3日、当社オフィスでの事務サポートをお願いできる方を募集しています。時給1,300円／交通費支給／勤務地：渋谷"></textarea></div>

      <p class="msg err" id="error" hidden></p>
      <button type="submit" class="btn" id="submit">幹事に送信する</button>
    </form>
    <p class="msg ok" id="done" hidden>送信しました。幹事が内容を確認し、現役へご連絡いたします。ありがとうございました。</p>
  </div>

  <script>
  (function () {
    var GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx_0-wzZN16mH8fg7TjybGfajmq_rCJTezzhChoW8PJo6VcnymkYo10LPvnbE9n-XJi/exec';
    var $ = function (id) { return document.getElementById(id); };
    var form = $('rform');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var err = $('error'); err.hidden = true;
      var email = form.email.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent='有効なメールアドレスを入力してください。'; err.hidden=false; return; }
      if (!form.body.value.trim()) { err.textContent='依頼内容をご記入ください。'; err.hidden=false; return; }
      var data = {
        action:'recruit', kind:form.kind.value, name:form.name.value.trim(), term:form.term.value.trim(),
        email:email, body:form.body.value.trim()
      };
      var btn = $('submit'); btn.disabled = true; btn.textContent = '送信中...';
      fetch(GAS_ENDPOINT, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(data) })
        .then(function(r){ return r.json(); })
        .then(function(res){
          if (res && res.ok) { form.hidden = true; $('done').hidden = false; return; }
          if (res && res.error === 'not_member') {
            err.innerHTML = 'このメールアドレスは会員登録されていません。<br>先に<a href="./" style="color:var(--gold)">トップページ</a>から「登録」をお願いします。';
            err.hidden = false; return;
          }
          err.textContent = '送信に失敗しました。時間をおいて再度お試しください。'; err.hidden = false;
        })
        .catch(function(){ err.textContent='送信に失敗しました。時間をおいて再度お試しください。'; err.hidden=false; })
        .finally(function(){ btn.disabled=false; btn.textContent='幹事に送信する'; });
    });
  })();
  </script>
</body>
</html>
