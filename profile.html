<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>詳細プロフィール登録 — 杏葉硬式庭球会</title>
<meta name="robots" content="noindex" />
<style>
  :root { --bg:#05060c; --fg:#eef1ff; --gold:#d4af37; --magenta:#ff3d7f; --dim:#8a93b8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:
      radial-gradient(ellipse at 70% 20%, rgba(212,175,55,0.10), transparent 50%),
      linear-gradient(135deg, #05060c, #03040a);
    min-height: 100vh; color: var(--fg);
    font-family: "Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; justify-content: center; padding: 6vh 5vw 12vh;
  }
  .wrap { width: min(560px, 100%); }
  .label { font-size:0.72rem; letter-spacing:0.45em; color:var(--gold); text-transform:uppercase; }
  h1 { margin-top:1rem; font-size:clamp(1.6rem,5vw,2.4rem); font-weight:800; line-height:1.3; }
  .greet { margin-top:1rem; font-size:1rem; color:var(--gold); letter-spacing:0.05em; }
  .lead { margin-top:0.8rem; font-size:0.85rem; color:var(--dim); line-height:1.9; }
  form { margin-top:2.2rem; display:flex; flex-direction:column; gap:1.3rem; }
  .field { display:block; }
  .field-label { display:block; font-size:0.72rem; letter-spacing:0.25em; color:var(--gold); margin-bottom:0.55rem; }
  input[type=text], select, textarea {
    width:100%; padding:0.95rem 1.1rem; background:rgba(255,255,255,0.04); color:var(--fg);
    border:1px solid rgba(212,175,55,0.25); border-radius:10px; font-size:1rem; font-family:inherit;
  }
  textarea { min-height:120px; resize:vertical; line-height:1.7; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--gold); box-shadow:0 0 18px rgba(212,175,55,0.2); }
  input::placeholder, textarea::placeholder { color:#555; }
  select { appearance:none; cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
    background-position:calc(100% - 20px) 50%,calc(100% - 14px) 50%; background-size:6px 6px,6px 6px; background-repeat:no-repeat;
  }
  select option { background:#11131c; color:var(--fg); }
  .radio-row { display:flex; gap:1.6rem; flex-wrap:wrap; }
  .radio { display:flex; align-items:center; gap:0.5rem; font-size:0.95rem; cursor:pointer; }
  .radio input { accent-color:var(--gold); width:18px; height:18px; }
  .btn {
    margin-top:0.6rem; padding:1.15rem 1rem; font-size:1rem; font-weight:800; letter-spacing:0.15em;
    color:var(--bg); background:linear-gradient(90deg,var(--gold),#f5d76e); border:0; border-radius:10px; cursor:pointer;
    transition:transform .2s, box-shadow .2s, opacity .2s;
  }
  .btn:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(212,175,55,0.5); }
  .btn:disabled { opacity:0.5; cursor:default; transform:none; box-shadow:none; }
  .msg { margin-top:1rem; font-size:0.9rem; line-height:1.8; }
  .msg.err { color:var(--magenta); }
  .msg.ok { color:var(--gold); }
  .state { color:var(--dim); font-size:0.9rem; margin-top:2rem; }
  .home { display:inline-block; margin-top:2rem; font-size:0.8rem; color:var(--dim); text-decoration:none; letter-spacing:0.1em; }
  .home:hover { color:var(--gold); }
  [hidden] { display:none !important; }
  .consent { display:flex; gap:0.7rem; align-items:flex-start; font-size:0.85rem; color:var(--fg); line-height:1.7; cursor:pointer; padding:1rem 1.1rem; border:1px solid rgba(212,175,55,0.25); border-radius:10px; background:rgba(212,175,55,0.05); }
  .consent input { accent-color:var(--gold); width:20px; height:20px; flex:none; margin-top:2px; }
  .consent strong { color:var(--gold); }
  .consent-note { color:var(--dim); font-size:0.78rem; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">Profile</div>
    <h1>詳細プロフィール登録</h1>

    <p class="state" id="loading">読み込み中...</p>
    <p class="state msg err" id="invalid" hidden>リンクが正しくないか、有効期限が切れています。<br>登録時のメールに記載のリンクから再度お開きください。</p>

    <div id="form-wrap" hidden>
      <p class="greet" id="greet"></p>
      <p class="lead">OB訪問・キャリア相談のマッチングに活用します。入力は任意・後から変更も可能です。</p>
      <form id="detail-form" novalidate>
        <label class="field">
          <span class="field-label">業界</span>
          <select name="industry">
            <option value="">選択してください</option>
            <option>IT・通信</option><option>メーカー・製造</option><option>商社</option>
            <option>金融・保険</option><option>コンサルティング</option><option>不動産・建設</option>
            <option>医療・福祉</option><option>教育</option><option>マスコミ・広告</option>
            <option>流通・小売</option><option>サービス</option><option>公務・団体</option>
            <option>経営者・起業</option><option>その他</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">職種</span>
          <select name="jobtype">
            <option value="">選択してください</option>
            <option>営業</option><option>企画・マーケティング</option><option>管理・事務</option>
            <option>技術・研究開発</option><option>IT・エンジニア</option>
            <option>専門職（医師・弁護士・会計士等）</option><option>クリエイティブ</option>
            <option>経営・役員</option><option>公務員</option><option>その他</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">所属（企業・団体）</span>
          <input type="text" name="company" placeholder="例）株式会社○○" />
        </label>
        <label class="field">
          <span class="field-label">役職・専門分野</span>
          <input type="text" name="role" placeholder="例）営業部長／ソフトウェア開発" />
        </label>
        <label class="field">
          <span class="field-label">性別</span>
          <select name="gender">
            <option value="">選択してください</option>
            <option>男性</option><option>女性</option><option>回答しない</option>
          </select>
        </label>
        <fieldset class="field" style="border:0;padding:0;">
          <span class="field-label">OB訪問・キャリア相談の受け入れ</span>
          <div class="radio-row">
            <label class="radio"><input type="radio" name="consult" value="可" /> 可</label>
            <label class="radio"><input type="radio" name="consult" value="応相談" /> 応相談</label>
            <label class="radio"><input type="radio" name="consult" value="不可" /> 不可</label>
          </div>
        </fieldset>
        <label class="field">
          <span class="field-label">ひとこと自己紹介</span>
          <textarea name="intro" placeholder="近況や、後輩へのメッセージなど自由にどうぞ。"></textarea>
        </label>

        <label class="consent">
          <input type="checkbox" name="listpublic" id="listpublic" />
          <span><strong>氏名を伏せて</strong>、業界・職種・会社名・期・性別・一言をOB一覧に掲載し、現役からのOB訪問依頼を受け付けることに同意します。<br><span class="consent-note">※氏名・連絡先は公開されません。連絡先の交換は、あなたが依頼を承認した場合のみ行われます。</span></span>
        </label>

        <p class="msg err" id="error" hidden></p>
        <button type="submit" class="btn" id="submit">この内容で登録する</button>
      </form>
      <p class="msg ok" id="done" hidden>ご登録ありがとうございました。内容を保存しました。</p>
      <a class="home" href="./">← トップページへ戻る</a>
    </div>
  </div>

  <script>
  (function () {
    var GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx_0-wzZN16mH8fg7TjybGfajmq_rCJTezzhChoW8PJo6VcnymkYo10LPvnbE9n-XJi/exec';

    var params = new URLSearchParams(location.search);
    var token = params.get('id') || '';
    var $ = function (id) { return document.getElementById(id); };

    if (!token) { $('loading').hidden = true; $('invalid').hidden = false; return; }

    // 本人情報の読み込み（事前入力）
    fetch(GAS_ENDPOINT + '?token=' + encodeURIComponent(token))
      .then(function (r) { return r.json(); })
      .then(function (res) {
        $('loading').hidden = true;
        if (!res || !res.ok) { $('invalid').hidden = false; return; }
        $('form-wrap').hidden = false;
        if (res.name) $('greet').textContent = res.name + ' 様';
        var form = $('detail-form');
        var d = res.detail || {};
        if (d.industry) form.industry.value = d.industry;
        if (d.jobtype)  form.jobtype.value  = d.jobtype;
        if (d.company)  form.company.value  = d.company;
        if (d.role)     form.role.value     = d.role;
        if (d.gender)   form.gender.value   = d.gender;
        if (d.intro)    form.intro.value    = d.intro;
        if (d.listpublic) form.listpublic.checked = true;
        if (d.consult) {
          var r2 = form.querySelector('input[name="consult"][value="' + d.consult + '"]');
          if (r2) r2.checked = true;
        }
      })
      .catch(function () { $('loading').hidden = true; $('invalid').hidden = false; });

    // 送信
    $('detail-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var form = e.target;
      var errEl = $('error'); errEl.hidden = true;
      var btn = $('submit');
      var data = {
        action: 'detail',
        token: token,
        industry: form.industry.value,
        jobtype: form.jobtype.value,
        company: form.company.value.trim(),
        role: form.role.value.trim(),
        gender: form.gender.value,
        consult: (form.querySelector('input[name="consult"]:checked') || {}).value || '',
        intro: form.intro.value.trim(),
        listpublic: form.listpublic.checked
      };
      btn.disabled = true; btn.textContent = '送信中...';
      fetch(GAS_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data)
      })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res && res.ok) {
            form.hidden = true;
            $('done').hidden = false;
            $('done').scrollIntoView({ behavior: 'smooth', block: 'center' });
          } else { throw new Error((res && res.error) || 'unknown'); }
        })
        .catch(function () {
          errEl.textContent = '送信に失敗しました。時間をおいて再度お試しください。';
          errEl.hidden = false;
        })
        .finally(function () { btn.disabled = false; btn.textContent = 'この内容で登録する'; });
    });
  })();
  </script>
</body>
</html>
